<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>MusicPlayer-Web</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="player-container">
      <!-- 标题栏 -->
      <div class="title-bar">MusicPlayer</div>
      <!-- 主体内容占位 -->
      <div class="content">
        <img src="img/dog.jpg" alt="Music Image" class="music-img" />
      </div>

      <div class="player-controls">
        <button class="pre-btn">上一首</button>
        <button class="play-btn">
          <!-- 播放图标（SVG） -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            fill="white"
            viewBox="0 0 24 24"
          >
            <path d="M8 5v14l11-7z"></path>
          </svg>
        </button>
        <button class="next-btn">下一首</button>
        <button class="volume-btn"></button>
      </div>
    </div>
  </body>
</html>
