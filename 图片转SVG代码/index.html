<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVG 阈值化矢量追踪器</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/imagetracerjs@1.2.6/imagetracer_v1.2.6.min.js"></script>
  </head>
  <body>
    <div class="container">
      <h2>图像去噪转 SVG 工具</h2>

      <div class="control-panel">
        <input type="file" id="imageInput" accept="image/png, image/jpeg" />
        <div class="slider-container">
          <label for="thresholdSlider"
            >二值化阈值 (去除灰底噪点):
            <span id="thresholdValue">150</span></label
          >
          <input
            type="range"
            id="thresholdSlider"
            min="0"
            max="255"
            value="150"
          />
        </div>
        <div class="slider-container">
          <label for="speckleSlider"
            >散点过滤 (忽略小面积噪点): <span id="speckleValue">8</span></label
          >
          <input type="range" id="speckleSlider" min="0" max="50" value="8" />
        </div>
        <button id="convertBtn" disabled>执行矢量化并生成 SVG</button>
      </div>

      <div class="preview-panel">
        <div class="canvas-wrapper">
          <h3>处理预览 (Canvas)</h3>
          <canvas id="previewCanvas"></canvas>
        </div>
        <div class="output-wrapper">
          <h3>SVG 源码输出 <button id="copyBtn">复制源码</button></h3>
          <textarea
            id="svgOutput"
            readonly
            placeholder="转换后的 SVG 代码将显示在这里..."
          ></textarea>
        </div>
      </div>
    </div>
    <script src="js/app.js"></script>
  </body>
</html>
